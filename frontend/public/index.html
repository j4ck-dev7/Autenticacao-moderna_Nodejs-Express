for acessar uma outra página, esa página vei ser  carregado dinamicamente pelo javascript em 
vez de recarregar a página inteira para uma nova página como nas interações comuns entre
navegador, servidor e cliente.
Em vez do navegador fazer as requisições para o backend, é o javascript que faz. Quando o js
